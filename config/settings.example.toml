# ppagent configuration (reference template).
# The live config is read from and written to ~/.config/ppagent/settings.toml —
# a single location outside the project tree that survives reinstalls. Copy
# this file there and edit as needed:
#   cp config/settings.example.toml ~/.config/ppagent/settings.toml

[llm]
base_url = "https://api.openai.com/v1"
api_key = "sk-your-key-here"
model = "gpt-4o"
temperature = 0.3
max_tokens = 4096
timeout = 120

[search]
default_date = "today"
default_limit = 50
sort = "trending"
profile_path = "~/.config/ppagent/profile.md"
relevance_threshold = 0.6
max_reports_per_run = 5

[report]
output_dir = "output"
template_dir = "templates"
formats = ["md", "html"]
download_pdf = true
pdf_cache_dir = ".cache/pdfs"
language = "English"  # output language for reports (e.g. "Chinese", "Japanese", "French")
writer_research = true  # enable multi-turn research before writing (searches unfamiliar concepts & cited works)

[scheduler]
enabled = false
cron_hour = 8
cron_minute = 0
timezone = "Asia/Shanghai"

[publish]
enabled = false

[publish.wechat]
enabled = false
appid = ""
secret = ""

[publish.notion]
enabled = false
api_key = ""
database_id = ""

[publish.github_pages]
enabled = false
username = ""           # GitHub username that owns the Pages repo
repo = ""               # e.g. "my-paper-blog"
repo_path = ""          # local clone path (must have push access)
branch = "main"         # branch Pages serves from
posts_subdir = "papers" # subfolder inside the repo where reports go
